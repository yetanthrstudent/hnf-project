name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - quartz
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branche quartz (code Quartz)
        uses: actions/checkout@v4
        with:
          ref: quartz
          fetch-depth: 0

      - name: Checkout vault depuis main
        uses: actions/checkout@v4
        with:
          ref: main
          path: vault-source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # --- Build FR (site principal) ---
      - name: Copier le vault FR dans content/
        run: |
          rm -rf content
          cp -r vault-source/vault content

      - name: Build Quartz FR
        run: npx quartz build

      # --- Build EN (sous-dossier /en/) ---
      - name: Copier le vault EN dans content/
        run: |
          rm -rf content
          cp -r vault-source/vault-en content

      - name: Swap config pour EN
        run: |
          mv quartz.config.ts quartz.config.fr.ts
          mv quartz.config.en.ts quartz.config.ts

      - name: Build Quartz EN
        run: npx quartz build -o public/en

      - name: Restaurer config FR
        run: |
          mv quartz.config.ts quartz.config.en.ts
          mv quartz.config.fr.ts quartz.config.ts

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
